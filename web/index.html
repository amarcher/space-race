<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>Space Race — a cosmic card game</title>
    <meta
      name="description"
      content="Blast off in Space Race, a free cosmic card game. Dodge black holes and asteroids, fire your engines, and race a rival to 1,000 light-years."
    />
    <meta
      name="keywords"
      content="space card game, Space Race, Mille Bornes, space race game, family card game, browser game, free online game, hazards and remedies, light years"
    />
    <meta name="author" content="Space Race" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://game.spaceexplorer.tech/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game.spaceexplorer.tech/" />
    <meta property="og:title" content="Space Race — a cosmic card game" />
    <meta
      property="og:description"
      content="Dodge black holes and asteroids, fire your engines, and race a rival to 1,000 light-years. A free space card game."
    />
    <meta property="og:image" content="https://game.spaceexplorer.tech/og-poster.jpg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta property="og:image:alt" content="A red-cross rescue shuttle blazes through glowing clouds, engines firing" />
    <!-- Video unfurl: a 16:9 crop of the hero win clip, shown by iMessage, Facebook, etc. -->
    <meta property="og:video" content="https://game.spaceexplorer.tech/og.mp4" />
    <meta property="og:video:secure_url" content="https://game.spaceexplorer.tech/og.mp4" />
    <meta property="og:video:type" content="video/mp4" />
    <meta property="og:video:width" content="1280" />
    <meta property="og:video:height" content="720" />
    <meta property="og:site_name" content="Space Race" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Space Race — a cosmic card game" />
    <meta
      name="twitter:description"
      content="Dodge black holes and asteroids, fire your engines, and race a rival to 1,000 light-years. A free space card game."
    />
    <meta name="twitter:image" content="https://game.spaceexplorer.tech/og-poster.jpg" />

    <!-- Theme color + icons (PWA manifest link is injected by vite-plugin-pwa) -->
    <meta name="theme-color" content="#07071a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Space Race" />

    <!-- Google Analytics 4 — feeds the app-traffic observability dashboard -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GS8HYJ69C3"></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() { dataLayer.push(arguments) }
      gtag('js', new Date())
      gtag('config', 'G-GS8HYJ69C3')
    </script>

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Space Race",
        "url": "https://game.spaceexplorer.tech/",
        "description": "A free space-race card game. Dodge black holes and asteroids, fire your engines, and race a rival to 1,000 light-years.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "gamePlatform": "Web Browser",
        "playMode": "SinglePlayer",
        "image": "https://game.spaceexplorer.tech/og.png",
        "inLanguage": "en",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
