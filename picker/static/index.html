<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1000 Light-Years · Art Console</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --void: #06061a;
      --panel: #0d0b20;
      --panel-2: #15102d;
      --line: #2b2450;
      --text: #fff7d6;
      --muted: #a9a0c7;
      --gold: #ffd93d;
      --red: #ff5e5b;
      --green: #10b981;
      --teal: #4ecdc4;
      --plasma: #c879ff;
      --white: #fffdf3;
      color-scheme: dark;
      font-family: Charter, "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 10%, rgba(200, 121, 255, .14), transparent 28rem),
        radial-gradient(circle at 88% 22%, rgba(78, 205, 196, .12), transparent 28rem),
        linear-gradient(180deg, #050514, var(--void) 42rem);
      color: var(--text);
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: .5;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(255, 247, 214, .12);
      background: rgba(6, 6, 26, .86);
      backdrop-filter: blur(18px);
    }

    .shell {
      width: min(1500px, calc(100vw - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      padding: 18px 0 16px;
      align-items: end;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--gold);
      font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 44px);
      line-height: .95;
      letter-spacing: 0;
      font-weight: 700;
    }

    .subhead {
      margin: 8px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .health {
      min-width: 250px;
      text-align: right;
      color: var(--muted);
      font: 12px/1.3 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 0 0 16px;
    }

    .stat {
      min-height: 76px;
      padding: 12px;
      border: 1px solid rgba(255, 247, 214, .12);
      background: rgba(13, 11, 32, .74);
      border-radius: 8px;
    }

    .stat strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 14px 0;
      border-top: 1px solid rgba(255, 247, 214, .08);
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid rgba(255, 247, 214, .14);
      border-radius: 6px;
      background: rgba(21, 16, 45, .92);
      color: var(--text);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .chip[aria-pressed="true"] {
      background: var(--gold);
      border-color: var(--gold);
      color: #17110b;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(255, 247, 214, .14);
      border-radius: 6px;
      background: rgba(21, 16, 45, .72);
      color: var(--muted);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .toggle input {
      accent-color: var(--gold);
    }

    main {
      padding: 22px 0 64px;
    }

    .lane {
      margin-bottom: 28px;
    }

    .lane-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }

    .lane-head h2 {
      margin: 0;
      font: 13px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--white);
    }

    .lane-head span {
      color: var(--muted);
      font-size: 13px;
    }

    .slot {
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr) 320px;
      gap: 18px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 247, 214, .13);
      border-radius: 8px;
      background: rgba(9, 8, 26, .74);
      box-shadow: 0 22px 70px rgba(0, 0, 0, .18);
    }

    .slot[data-type="Hazard"] { border-left: 4px solid var(--red); }
    .slot[data-type="Remedy"] { border-left: 4px solid var(--green); }
    .slot[data-type="Distance"] { border-left: 4px solid var(--plasma); }
    .slot[data-type="Safety"] { border-left: 4px solid var(--gold); }
    .slot[data-type="Auxiliary"] { border-left: 4px solid var(--teal); }

    .title-row {
      display: flex;
      gap: 8px;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .title-row h3 {
      margin: 0;
      font-size: 21px;
      line-height: 1.05;
    }

    .code {
      color: var(--muted);
      font: 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border: 1px solid currentColor;
      border-radius: 5px;
      font: 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .Hazard { color: var(--red); }
    .Remedy { color: var(--green); }
    .Distance { color: var(--plasma); }
    .Safety { color: var(--gold); }
    .Auxiliary { color: var(--teal); }

    .art-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      color: var(--muted);
      font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .v1, .candidate {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3 / 4;
      background: linear-gradient(145deg, rgba(21, 16, 45, .9), rgba(6, 6, 26, .95));
      border: 1px solid rgba(255, 247, 214, .13);
      border-radius: 6px;
    }

    .v1 img, .candidate img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: zoom-in;
    }

    .v1.locked {
      box-shadow: 0 0 0 3px rgba(255, 217, 61, .85) inset;
    }

    .empty {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      padding: 18px;
      color: rgba(255, 247, 214, .42);
      text-align: center;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .candidate-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 10px;
    }

    .candidate.new {
      animation: newPulse 1.6s ease-out;
    }

    @keyframes newPulse {
      0% { box-shadow: 0 0 0 4px rgba(16, 185, 129, .95); }
      100% { box-shadow: 0 0 0 4px transparent; }
    }

    .candidate-actions {
      position: absolute;
      inset: auto 0 0;
      display: flex;
      justify-content: space-between;
      gap: 6px;
      padding: 8px;
      background: linear-gradient(0deg, rgba(6, 6, 26, .96), rgba(6, 6, 26, 0));
      transform: translateY(100%);
      transition: transform .16s ease;
    }

    .candidate:hover .candidate-actions,
    .candidate:focus-within .candidate-actions {
      transform: translateY(0);
    }

    .tiny {
      min-height: 28px;
      padding: 0 9px;
      border-radius: 5px;
      background: rgba(255, 247, 214, .1);
      color: var(--text);
      font: 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .promote {
      background: var(--gold);
      color: #161003;
      font-weight: 700;
    }

    .delete {
      color: var(--red);
      border: 1px solid rgba(255, 94, 91, .65);
      background: rgba(255, 94, 91, .05);
    }

    .panel {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .prompt {
      width: 100%;
      min-height: 142px;
      resize: vertical;
      padding: 10px;
      border: 1px solid rgba(255, 247, 214, .13);
      border-radius: 6px;
      background: rgba(6, 6, 26, .68);
      color: var(--text);
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .notes {
      min-height: 70px;
    }

    .select, .count {
      height: 34px;
      border: 1px solid rgba(255, 247, 214, .13);
      border-radius: 6px;
      background: rgba(6, 6, 26, .68);
      color: var(--text);
      padding: 0 8px;
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .primary, .secondary {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 6px;
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .primary {
      background: var(--green);
      color: #03130d;
      font-weight: 700;
    }

    .secondary {
      background: rgba(255, 247, 214, .08);
      border: 1px solid rgba(255, 247, 214, .14);
      color: var(--text);
    }

    .statusline {
      min-height: 16px;
      color: var(--muted);
      font: 11px/1.3 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(3, 3, 13, .94);
    }

    .modal.open { display: grid; }
    .modal img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 6px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    @media (max-width: 1050px) {
      .slot {
        grid-template-columns: 170px minmax(0, 1fr);
      }
      .panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 20px, 1500px);
      }
      .topbar,
      .slot {
        grid-template-columns: 1fr;
      }
      .health {
        text-align: left;
      }
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .candidate-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell">
      <div class="topbar">
        <div>
          <p class="eyebrow">1000 Light-Years</p>
          <h1>Art finishing console</h1>
          <p class="subhead">Generate, compare, promote, and leave the tiny judgment breadcrumbs that make the next pass easier.</p>
        </div>
        <div id="health" class="health">checking image generator...</div>
      </div>

      <div class="stats" id="stats"></div>

      <div class="controls" aria-label="Filters">
        <div class="segmented" id="type-filter"></div>
        <label class="toggle"><input type="checkbox" id="needs-art" /> no winner</label>
        <label class="toggle"><input type="checkbox" id="has-candidates" /> has candidates</label>
        <label class="toggle"><input type="checkbox" id="tonight" /> hazards / safeties / remedies</label>
      </div>
    </div>
  </header>

  <main class="shell" id="slots"></main>

  <div id="modal" class="modal" onclick="closeModal()">
    <img id="modal-img" alt="" />
  </div>

  <template id="stat-tpl">
    <div class="stat"><strong></strong><span></span></div>
  </template>

  <template id="slot-tpl">
    <article class="slot" data-slot>
      <div>
        <div class="title-row">
          <h3 data-title></h3>
          <span class="badge" data-type></span>
          <span class="code" data-id></span>
        </div>
        <div class="art-label"><span>Current winner</span><span data-v1-meta></span></div>
        <div class="v1" data-winner></div>
      </div>

      <div>
        <div class="art-label"><span>Candidates</span><span data-candidate-meta></span></div>
        <div class="candidate-grid" data-candidates></div>
      </div>

      <div class="panel">
        <div class="statusline" data-subtitle></div>
        <label class="sr-only" data-prompt-label>Prompt</label>
        <textarea class="prompt" data-prompt-input spellcheck="false"></textarea>
        <div class="row">
          <button class="primary" data-regenerate>Generate</button>
          <label class="statusline">count <input class="count" type="number" min="1" max="8" value="3" data-count /></label>
          <span class="statusline" data-regen-status></span>
        </div>
        <div class="row">
          <select class="select" data-status-select>
            <option value="">Auto status</option>
            <option value="generate">Needs generation</option>
            <option value="shortlist">Shortlist</option>
            <option value="rework">Prompt rework</option>
            <option value="locked">Locked for print</option>
          </select>
          <button class="secondary" data-save>Save notes</button>
          <span class="statusline" data-save-status></span>
        </div>
        <textarea class="prompt notes" data-notes placeholder="What makes the winner work? What should the next batch fix?"></textarea>
      </div>
    </article>
  </template>

  <template id="candidate-tpl">
    <div class="candidate" data-candidate>
      <img alt="" />
      <div class="candidate-actions">
        <button class="tiny promote" data-promote>Promote</button>
        <button class="tiny delete" data-delete>Delete</button>
      </div>
    </div>
  </template>

  <script>
    let SLOTS_DATA = null;
    let activeType = "";

    const TYPES = ["All", "Hazard", "Remedy", "Safety", "Distance", "Auxiliary"];
    const TONIGHT_TYPES = new Set(["Hazard", "Remedy", "Safety"]);

    function stat(label, value) {
      const node = document.getElementById("stat-tpl").content.cloneNode(true);
      node.querySelector("strong").textContent = value;
      node.querySelector("span").textContent = label;
      return node;
    }

    function emptyMessage(message) {
      const node = document.createElement("div");
      node.className = "empty";
      node.textContent = message;
      return node;
    }

    function slotAutoStatus(slot) {
      if (slot.status) return slot.status;
      if (!slot.v1_url && slot.candidates.length) return "shortlist";
      if (!slot.v1_url) return "generate";
      if (slot.candidates.length) return "shortlist";
      return "locked";
    }

    function statusLabel(status) {
      return {
        generate: "needs generation",
        shortlist: "choose candidate",
        rework: "prompt rework",
        locked: "locked",
      }[status] || "auto";
    }

    async function loadSlots() {
      const r = await fetch("/api/slots");
      SLOTS_DATA = await r.json();
      render();
    }

    async function checkHealth() {
      const health = document.getElementById("health");
      try {
        const r = await fetch("/api/health");
        const d = await r.json();
        health.textContent = d.image_gen_ok
          ? `image-gen ${d.image_gen.model || "ready"} · loaded ${d.image_gen.loaded}`
          : "image-gen unreachable · you can still review and promote";
        health.style.color = d.image_gen_ok ? "var(--muted)" : "var(--red)";
      } catch (e) {
        health.textContent = "picker server error";
        health.style.color = "var(--red)";
      }
    }

    function renderTypeFilter() {
      const root = document.getElementById("type-filter");
      root.replaceChildren();
      for (const type of TYPES) {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.textContent = type;
        btn.setAttribute("aria-pressed", String((type === "All" && !activeType) || activeType === type));
        btn.onclick = () => {
          activeType = type === "All" ? "" : type;
          render();
        };
        root.appendChild(btn);
      }
    }

    function renderStats(slots) {
      const root = document.getElementById("stats");
      const winners = slots.filter(s => s.v1_url).length;
      const noWinner = slots.length - winners;
      const waiting = slots.filter(s => !s.v1_url && s.candidates.length).length;
      const locked = slots.filter(s => slotAutoStatus(s) === "locked").length;
      root.replaceChildren(
        stat("winners selected", `${winners}/${slots.length}`),
        stat("need winner", noWinner),
        stat("ready to decide", waiting),
        stat("locked", locked)
      );
    }

    function openModal(url) {
      document.getElementById("modal-img").src = url;
      document.getElementById("modal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("open");
    }

    function imageMeta(img, target) {
      img.onload = () => {
        target.textContent = `${img.naturalWidth}x${img.naturalHeight}`;
      };
    }

    function renderSlot(slot, isNewlyGenerated = new Set()) {
      const root = document.getElementById("slot-tpl").content.children[0].cloneNode(true);
      root.dataset.slotId = slot.id;
      root.dataset.type = slot.type;

      root.querySelector("[data-title]").textContent = slot.title;
      root.querySelector("[data-id]").textContent = slot.id;
      root.querySelector("[data-subtitle]").textContent = `${slot.subtitle || ""} · ${statusLabel(slotAutoStatus(slot))}`;

      const badge = root.querySelector("[data-type]");
      badge.textContent = slot.type;
      badge.classList.add(slot.type);

      const v1 = root.children[0].querySelector(".v1");
      const v1Meta = root.querySelector("[data-v1-meta]");
      if (slot.v1_url) {
        v1.classList.add("locked");
        const img = document.createElement("img");
        img.src = slot.v1_url;
        img.alt = `${slot.title} current winner`;
        img.onclick = () => openModal(slot.v1_url);
        imageMeta(img, v1Meta);
        v1.appendChild(img);
      } else {
        const message = emptyMessage("No winner yet");
        v1.textContent = message.textContent;
        v1.classList.add("empty");
        v1Meta.textContent = "missing";
      }

      const candMeta = root.querySelector("[data-candidate-meta]");
      candMeta.textContent = `${slot.candidates.length} available`;
      const cRoot = root.querySelector("[data-candidates]");
      if (slot.candidates.length === 0) {
        const message = emptyMessage("Generate a batch, then promote the image that belongs in the deck.");
        cRoot.textContent = message.textContent;
        cRoot.classList.add("empty");
      } else {
        for (const c of slot.candidates) {
          const card = document.getElementById("candidate-tpl").content.children[0].cloneNode(true);
          if (isNewlyGenerated.has(c.filename)) card.classList.add("new");
          const img = card.querySelector("img");
          img.src = c.url;
          img.alt = `${slot.title} candidate ${c.suffix}`;
          img.onclick = () => openModal(c.url);
          card.querySelector("[data-promote]").onclick = (e) => {
            e.stopPropagation();
            promote(slot.id, c.filename);
          };
          card.querySelector("[data-delete]").onclick = (e) => {
            e.stopPropagation();
            deleteCandidate(c.filename);
          };
          cRoot.appendChild(card);
        }
      }

      const promptInput = root.querySelector("[data-prompt-input]");
      promptInput.value = slot.prompt;
      const countInput = root.querySelector("[data-count]");
      const regenBtn = root.querySelector("[data-regenerate]");
      const regenStatus = root.querySelector("[data-regen-status]");
      regenBtn.onclick = () => regenerate(slot.id, promptInput, countInput, regenBtn, regenStatus);

      const statusSelect = root.querySelector("[data-status-select]");
      statusSelect.value = slot.status || "";
      const notes = root.querySelector("[data-notes]");
      notes.value = slot.notes || "";
      const saveStatus = root.querySelector("[data-save-status]");
      root.querySelector("[data-save]").onclick = () => saveSlot(slot.id, statusSelect, notes, saveStatus);

      return root;
    }

    function filteredSlots() {
      const needsArt = document.getElementById("needs-art").checked;
      const hasCandidates = document.getElementById("has-candidates").checked;
      const tonight = document.getElementById("tonight").checked;
      return SLOTS_DATA.slots.filter((s) => {
        if (activeType && s.type !== activeType) return false;
        if (tonight && !TONIGHT_TYPES.has(s.type)) return false;
        if (needsArt && s.v1_url) return false;
        if (hasCandidates && s.candidates.length === 0) return false;
        return true;
      });
    }

    function render() {
      if (!SLOTS_DATA) return;
      renderTypeFilter();
      renderStats(SLOTS_DATA.slots);
      const root = document.getElementById("slots");
      const slots = filteredSlots();
      root.replaceChildren();

      const lanes = [
        ["Decision queue", slots.filter(s => !s.v1_url && s.candidates.length)],
        ["Generate next", slots.filter(s => !s.v1_url && s.candidates.length === 0)],
        ["Polish / compare", slots.filter(s => s.v1_url && s.candidates.length)],
        ["Locked", slots.filter(s => s.v1_url && s.candidates.length === 0)],
      ];

      for (const [name, laneSlots] of lanes) {
        if (laneSlots.length === 0) continue;
        const lane = document.createElement("section");
        lane.className = "lane";
        const laneHead = document.createElement("div");
        laneHead.className = "lane-head";
        const title = document.createElement("h2");
        title.textContent = name;
        const count = document.createElement("span");
        count.textContent = `${laneSlots.length} card${laneSlots.length === 1 ? "" : "s"}`;
        laneHead.append(title, count);
        lane.appendChild(laneHead);
        for (const slot of laneSlots) lane.appendChild(renderSlot(slot));
        root.appendChild(lane);
      }

      if (slots.length === 0) {
        root.appendChild(emptyMessage("No cards match these filters."));
      }
    }

    async function regenerate(slotId, promptInput, countInput, btn, status) {
      const prompt = promptInput.value.trim();
      const count = parseInt(countInput.value, 10);
      if (!prompt) return;
      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = "Generating";
      const t0 = Date.now();
      const tick = setInterval(() => {
        const elapsed = Math.round((Date.now() - t0) / 1000);
        status.textContent = `${elapsed}s elapsed`;
      }, 1000);
      try {
        const r = await fetch("/api/regenerate", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ slot_id: slotId, prompt, count }),
        });
        if (!r.ok) {
          status.textContent = "error";
          alert(await r.text());
          return;
        }
        const data = await r.json();
        status.textContent = `done · ${data.results.filter(x => x.ok).length}/${data.results.length}`;
        const newFiles = new Set(data.results.filter(x => x.ok).map(x => x.filename));
        const fullR = await fetch("/api/slots");
        SLOTS_DATA = await fullR.json();
        const newSlot = SLOTS_DATA.slots.find(s => s.id === slotId);
        const oldEl = document.querySelector(`[data-slot-id="${slotId}"]`);
        if (oldEl && newSlot) oldEl.replaceWith(renderSlot(newSlot, newFiles));
        renderStats(SLOTS_DATA.slots);
      } catch (e) {
        status.textContent = e.message;
      } finally {
        clearInterval(tick);
        btn.disabled = false;
        btn.textContent = original;
      }
    }

    async function promote(slotId, filename) {
      if (!confirm(`Promote ${filename} to the print winner? Existing v1 is backed up.`)) return;
      const r = await fetch("/api/promote", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ slot_id: slotId, candidate_filename: filename }),
      });
      if (!r.ok) {
        alert("promote failed: " + await r.text());
        return;
      }
      await loadSlots();
    }

    async function deleteCandidate(filename) {
      if (!confirm(`Delete ${filename}?`)) return;
      const r = await fetch("/api/delete_candidate", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ candidate_filename: filename }),
      });
      if (!r.ok) {
        alert("delete failed: " + await r.text());
        return;
      }
      await loadSlots();
    }

    async function saveSlot(slotId, statusSelect, notesInput, saveStatus) {
      saveStatus.textContent = "saving";
      const r = await fetch("/api/slot_update", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          slot_id: slotId,
          status: statusSelect.value,
          notes: notesInput.value,
        }),
      });
      saveStatus.textContent = r.ok ? "saved" : "save failed";
      if (r.ok) await loadSlots();
    }

    for (const id of ["needs-art", "has-candidates", "tonight"]) {
      document.getElementById(id).addEventListener("change", render);
    }
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    checkHealth();
    loadSlots();
    setInterval(checkHealth, 30_000);
  </script>
</body>
</html>
